name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: orthanc-dicomweb-oauth:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Test Docker image
        run: |
          # Test that the image was built and can be inspected
          docker inspect orthanc-dicomweb-oauth:ci-test
          # Test that Python dependencies are installed
          docker run --rm --entrypoint python3 orthanc-dicomweb-oauth:ci-test -c "import requests; print('Dependencies OK')"
          # Test that plugin files exist
          docker run --rm --entrypoint ls orthanc-dicomweb-oauth:ci-test -la /etc/orthanc/plugins/
          echo "Docker image validation passed"

  build-plugin:
    name: Build and Test Plugin-Only Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build plugin-only image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.plugin
          push: false
          load: true
          tags: orthanc-dicomweb-oauth:ci-plugin-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Test plugin-only image
        run: |
          docker run --rm orthanc-dicomweb-oauth:ci-plugin-test sh -c "ls /plugin/src/ && ls /plugin/schemas/ && test -f /plugin/requirements.txt"
          echo "Plugin image validation passed"
