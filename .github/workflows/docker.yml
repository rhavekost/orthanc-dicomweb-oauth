name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: orthanc-dicomweb-oauth:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Test Docker image
        run: |
          docker run --rm --entrypoint python3 orthanc-dicomweb-oauth:ci-test -c "import requests; print('Dependencies OK')"
          docker run --rm --entrypoint ls orthanc-dicomweb-oauth:ci-test -la /etc/orthanc/plugins/
          echo "Docker image validation passed"
