name: Release

on:
  push:
    tags: ['v*']

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/orthanc-dicomweb-oauth

jobs:
  release:
    name: Create GitHub Release with zip artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create release zip
        run: |
          mkdir -p release-artifact/orthanc-dicomweb-oauth-${{ steps.version.outputs.VERSION }}
          rsync -av --exclude='__pycache__' --exclude='*.pyc' --exclude='*.pyo' --exclude='*.egg-info' \
            src/ release-artifact/orthanc-dicomweb-oauth-${{ steps.version.outputs.VERSION }}/src/
          cp -r schemas/ release-artifact/orthanc-dicomweb-oauth-${{ steps.version.outputs.VERSION }}/schemas/
          cp requirements.txt release-artifact/orthanc-dicomweb-oauth-${{ steps.version.outputs.VERSION }}/
          cp INSTALL.md release-artifact/orthanc-dicomweb-oauth-${{ steps.version.outputs.VERSION }}/
          cd release-artifact
          zip -r ../orthanc-dicomweb-oauth-${{ steps.version.outputs.VERSION }}.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: orthanc-dicomweb-oauth-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
          draft: false

  docker-plugin:
    name: Push plugin-only image to Docker Hub
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          flavor: |
            suffix=-plugin,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push plugin-only image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.plugin
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-standalone:
    name: Push standalone image to Docker Hub
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push standalone image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
